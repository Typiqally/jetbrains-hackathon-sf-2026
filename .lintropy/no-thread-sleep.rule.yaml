severity: warning
description: |
  Flags direct `std::thread::sleep(...)` calls in production Rust code.
  Blocking sleeps make tests and command paths flaky; prefer injected
  clocks, retries, or async timers where appropriate.
message: "avoid `std::thread::sleep(...)` in src/"
include: ["src/**/*.rs"]
language: rust
query: |
  (call_expression
    function: (scoped_identifier
      path: (scoped_identifier
        path: (identifier) @std
        name: (identifier) @thread)
      name: (identifier) @sleep)
    (#eq? @std "std")
    (#eq? @thread "thread")
    (#eq? @sleep "sleep")) @match
