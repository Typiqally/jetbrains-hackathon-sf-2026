language: rust
severity: warning
message: "avoid .unwrap() on `{{recv}}` — handle the error explicitly"
include: ["src/**/*.rs"]
query: |
  (call_expression
    function: (field_expression
      value: (_) @recv
      field: (field_identifier) @method)
    (#eq? @method "unwrap")) @match
fix: '{{recv}}.expect("TODO: handle error")'
