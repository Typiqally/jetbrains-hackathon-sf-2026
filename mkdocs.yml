site_name: Lintropy
site_description: Repo-local linting for rules your codebase actually cares about.
site_url: https://typiqally.github.io/lintropy/
repo_url: https://github.com/Typiqally/lintropy
repo_name: Typiqally/lintropy

theme:
  name: material
  logo: null
  favicon: null
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: black
      accent: green

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Rule Language: rule-language.md
  - CLI Guide: cli.md
  - Editor And Agent Setup: editor-and-agent-setup.md
  - Troubleshooting: troubleshooting.md
